<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Library</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <h1>Book Library</h1>
    <form action="" method="get">
      <label for="bookName">Book</label>
      <input type="text" name="bookName" id="bookName" required />
      <label for="author">Author</label>
      <input type="text" name="author" id="author" required />
      <label for="readStatus">Status</label>
      <select name="readStatus" id="readStatus" required>
        <option value="read">Read</option>
        <option value="notRead">Not Read</option>
      </select>
      <button>Submit</button>
    </form>
    <table id="libraryTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </body>
</html>
